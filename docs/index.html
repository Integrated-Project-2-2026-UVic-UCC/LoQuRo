<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoQuRo — Lowcost Quadruped Robot</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow:wght@700;800&family=Outfit:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #080808;
      --surface: #111111;
      --surface-2: #1a1a1a;
      --border: rgba(255, 255, 255, 0.07);
      --border-hover: rgba(255, 255, 255, 0.14);
      --accent: #e63946;
      --accent-dim: rgba(230, 57, 70, 0.10);
      --accent-glow: rgba(230, 57, 70, 0.25);
      --gold: #c9a84c;
      --gold-dim: rgba(201, 168, 76, 0.10);
      --text: #f0f0f0;
      --text-muted: #7a7a7a;
      --text-subtle: #3a3a3a;
      --font-display: 'Barlow', sans-serif;
      --font-body: 'Outfit', sans-serif;
      --font-mono: 'Geist Mono', monospace;
      --radius: 10px;
      --nav-h: 58px;
      --sidebar-w: 270px;
    }

    body.light {
      --bg: #f2f2f0;
      --surface: #ffffff;
      --surface-2: #e8e8e5;
      --border: rgba(0, 0, 0, 0.09);
      --border-hover: rgba(0, 0, 0, 0.18);
      --text: #111111;
      --text-muted: #555555;
      --text-subtle: #aaaaaa;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.022;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── NAVBAR ── */
    .navbar {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 40px);
      max-width: 980px;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      background: rgba(10, 10, 10, 0.5);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid var(--border);
      border-radius: 32px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
      z-index: 1000;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
    }

    body.light .navbar {
      background: rgba(242, 242, 240, 0.75);
    }

    .navbar.hidden {
      transform: translate(-50%, -150%);
      opacity: 0;
      pointer-events: none;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hamburger {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.2s;
      flex-shrink: 0;
    }

    body.light .hamburger {
      background: rgba(0, 0, 0, 0.06);
    }

    .hamburger:hover {
      background: var(--accent);
      color: #fff;
      transform: scale(1.08);
    }

    .hamburger svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
    }

    /* ── LOGO ── */
    .nav-logo {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 9px;
      color: var(--text);
      text-decoration: none;
    }

    body.light .nav-logo {
      color: #111;
    }

    .nav-logo-mark {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      background: transparent;
      border: 1.5px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.5px;
      position: relative;
      overflow: hidden;
    }

    .nav-logo-mark::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .nav-logo:hover .nav-logo-mark::before {
      opacity: 0.15;
    }

    .nav-logo-mark::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 6px;
      height: 6px;
      border-top: 1.5px solid var(--accent);
      border-left: 1.5px solid var(--accent);
      border-radius: 1px 0 0 0;
    }

    .nav-logo-bracket-br {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 6px;
      height: 6px;
      border-bottom: 1.5px solid var(--accent);
      border-right: 1.5px solid var(--accent);
      border-radius: 0 0 1px 0;
    }

    .nav-logo-text {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 1px;
    }

    .nav-logo-text .accent {
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .nav-link {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      padding: 6px 13px;
      border-radius: 20px;
      transition: color 0.2s, background 0.2s;
      letter-spacing: 0.1px;
    }

    .nav-link:hover {
      color: var(--accent);
      background: var(--accent-dim);
    }

    .nav-link.active {
      color: var(--accent);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .repo-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      transition: background 0.2s, color 0.2s, transform 0.2s;
      text-decoration: none;
    }

    body.light .repo-link {
      background: rgba(0, 0, 0, 0.06);
      color: #111;
    }

    .repo-link:hover {
      background: var(--accent);
      color: #fff;
      transform: scale(1.08);
    }

    .repo-link svg {
      width: 17px;
      height: 17px;
      fill: currentColor;
    }

    /* ── SIDEBAR ── */
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .sidebar-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--sidebar-w);
      background: rgba(10, 10, 10, 0.94);
      backdrop-filter: blur(36px) saturate(160%);
      -webkit-backdrop-filter: blur(36px) saturate(160%);
      border-right: 1px solid var(--border);
      z-index: 1200;
      display: flex;
      flex-direction: column;
      padding: 26px 18px;
      transform: translateX(-110%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.light .sidebar {
      background: rgba(248, 248, 246, 0.97);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .sidebar-logo {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      letter-spacing: 0.5px;
    }

    body.light .sidebar-logo {
      color: #111;
    }

    .sidebar-close {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      font-size: 14px;
    }

    body.light .sidebar-close {
      background: rgba(0, 0, 0, 0.07);
      color: #555;
    }

    .sidebar-close:hover {
      background: var(--accent);
      color: #fff;
    }

    .sidebar-section-label {
      font-family: var(--font-mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--text-subtle);
      margin-bottom: 9px;
      padding-left: 4px;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 1px;
      margin-bottom: 28px;
    }

    .sidebar-link {
      background: none;
      border: none;
      text-align: left;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      padding: 9px 12px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-link:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    body.light .sidebar-link:hover {
      background: rgba(0, 0, 0, 0.05);
      color: #111;
    }

    .sidebar-link.active {
      color: var(--accent);
      background: var(--accent-dim);
      font-weight: 500;
    }

    .sidebar-link-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .sidebar-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 6px 0 18px;
    }

    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 14px;
      transition: background 0.2s, color 0.2s;
      width: 100%;
      text-align: left;
    }

    .theme-toggle:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    body.light .theme-toggle:hover {
      background: rgba(0, 0, 0, 0.05);
      color: #111;
    }

    .sidebar-bottom {
      margin-top: auto;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 0 24px;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(to bottom, rgba(8, 8, 8, 0.3) 0%, rgba(8, 8, 8, 0.1) 40%, rgba(8, 8, 8, 0.75) 100%);
    }

    body.light .hero-overlay {
      background: linear-gradient(to bottom, rgba(242, 242, 240, 0.65) 0%, rgba(242, 242, 240, 0.25) 40%, rgba(242, 242, 240, 0.85) 100%);
    }

    /* Subtle dark gradient mesh background */
    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 50%, rgba(230, 57, 70, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 30%, rgba(201, 168, 76, 0.04) 0%, transparent 60%),
        #080808;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 820px;
      width: 100%;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(230, 57, 70, 0.2);
      padding: 6px 14px;
      border-radius: 20px;
      margin-bottom: 28px;
    }

    .hero-eyebrow-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 2s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(72px, 13vw, 130px);
      font-weight: 400;
      line-height: 0.88;
      letter-spacing: -2px;
      color: var(--text);
      margin-bottom: 12px;
      font-style: italic;
    }

    body.light .hero-title {
      color: #111;
    }

    .hero-title .accent {
      color: var(--accent);
      font-style: normal;
    }

    .hero-subtitle {
      font-family: var(--font-body);
      font-size: clamp(11px, 1.6vw, 15px);
      font-weight: 500;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 36px;
    }

    .hero-desc {
      font-size: 16px;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 500px;
      margin: 0 auto 40px;
    }

    /* ── VIDEO PLAYER ── */
    .video-player-wrap {
      position: relative;
      width: 100%;
      max-width: 740px;
      margin: 0 auto 44px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(230, 57, 70, 0.08);
      aspect-ratio: 16 / 9;
      cursor: pointer;
      background: #000;
    }

    .video-player-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.3s;
    }

    /* Poster / thumbnail overlay when paused */
    .video-poster-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.55) 0%, rgba(0, 0, 0, 0.3) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s;
      z-index: 3;
    }

    .video-poster-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Play button */
    .play-btn {
      position: relative;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(230, 57, 70, 0.15);
      border: 1.5px solid rgba(230, 57, 70, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.25s, border-color 0.25s;
      backdrop-filter: blur(8px);
    }

    .video-player-wrap:hover .play-btn {
      transform: scale(1.12);
      background: rgba(230, 57, 70, 0.28);
      border-color: rgba(230, 57, 70, 0.9);
    }

    .play-btn-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(230, 57, 70, 0.2);
      animation: ring-pulse 2.5s ease-in-out infinite;
    }

    @keyframes ring-pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.6;
      }

      50% {
        transform: scale(1.12);
        opacity: 0;
      }
    }

    .play-icon {
      width: 0;
      height: 0;
      border-top: 12px solid transparent;
      border-bottom: 12px solid transparent;
      border-left: 20px solid #fff;
      margin-left: 4px;
      filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.4));
    }

    /* Video label */
    .video-label {
      position: absolute;
      bottom: 14px;
      left: 18px;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      z-index: 4;
      pointer-events: none;
    }

    /* Video scan-line overlay */
    .video-player-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.015) 2px,
          rgba(0, 0, 0, 0.015) 4px);
      pointer-events: none;
      z-index: 5;
    }

    /* PRICE BADGE */
    .price-callout {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      background: rgba(201, 168, 76, 0.08);
      border: 1px solid rgba(201, 168, 76, 0.25);
      padding: 14px 24px;
      border-radius: 12px;
      margin-bottom: 44px;
    }

    .price-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .price-label {
      font-family: var(--font-mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-subtle);
      margin-bottom: 3px;
    }

    .price-value {
      font-family: var(--font-body);
      font-size: 22px;
      font-weight: 700;
    }

    .price-value.ours {
      color: var(--gold);
    }

    .price-value.theirs {
      color: var(--text-muted);
      text-decoration: line-through;
      font-size: 16px;
    }

    .price-vs {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-subtle);
      padding: 0 4px;
    }

    .price-divider {
      width: 1px;
      height: 36px;
      background: rgba(201, 168, 76, 0.2);
    }

    .price-note {
      font-size: 11px;
      color: var(--gold);
      font-family: var(--font-mono);
      text-align: left;
    }

    .hero-cta {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      box-shadow: 0 4px 24px var(--accent-glow);
    }

    .btn-primary:hover {
      background: #c5313e;
      transform: translateY(-1px);
      box-shadow: 0 8px 32px var(--accent-glow);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      padding: 12px 24px;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      text-decoration: none;
    }

    body.light .btn-secondary {
      background: rgba(0, 0, 0, 0.05);
    }

    .btn-secondary:hover {
      border-color: var(--border-hover);
      background: rgba(255, 255, 255, 0.12);
    }

    .hero-scroll {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: var(--text-subtle);
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 2px;
      animation: bounce 2.5s ease-in-out infinite;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateX(-50%) translateY(0);
      }

      50% {
        transform: translateX(-50%) translateY(6px);
      }
    }

    .hero-scroll svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
    }

    /* ── LAYOUT ── */
    .main-content {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page {
      width: 100%;
      max-width: 740px;
      padding: 80px 24px 120px;
      animation: pageIn 0.45s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes pageIn {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── TYPOGRAPHY ── */
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;

    .carousel-nav {

    .carousel-nav:hover {

    .carousel-nav.prev {

    }

    .carousel-nav.next {

    .carousel-dots {

    .carousel-dot {

    function LogoMark({ small }) {
      const size = small ? 24 : 30;
      return (
        <div className="nav-logo-mark" style={{ width: size, height: size }}>
          <span style={{ position: 'relative', zIndex: 1, fontSize: small ? 9 : 10 }}>LQR</span>
          <div className="nav-logo-bracket-br" />
        </div>

    /* ── TERMINAL ── */
    function Terminal({ title = "bash", children }) {
      return (
        <div className="terminal">
          <div className="terminal-bar">
            <div className="t-dot red" /><div className="t-dot yellow" /><div className="t-dot green" />

          </div>
          <div className="terminal-body">{children}</div>
        </div>
      );
    }

    /* ── CAROUSEL ── */
    function Carousel({ slides }) {
      const [i, setI] = useState(0);
      if (!slides || slides.length === 0) return null;
      const prev = () => setI(n => (n - 1 + slides.length) % slides.length);
      const next = () => setI(n => (n + 1) % slides.length);
      return (
        <div className="carousel">
          <div className="carousel-track" style={{ transform: `translateX(-${i * 100}%)` }}>
            {slides.map((s, idx) => (
              <div className="carousel-slide" key={idx}>
                <img src={s.src} alt={s.caption} />
              </div>
            ))}
          </div>
          {slides.length > 1 && <>
            <button className="carousel-nav prev" onClick={prev}>‹</button>
            <button className="carousel-nav next" onClick={next}>›</button>
          </>}
          <div className="carousel-dots">
            {slides.map((_, idx) => <button key={idx} className={`carousel-dot ${idx === i ? 'active' : ''}`} onClick={() => setI(idx)} />)}
          </div>
          {slides[i].caption && <div className="carousel-caption">{slides[i].caption}</div>}
        </div>
      );
    }

    /* ── VIDEO PLAYER ── */
    function VideoPlayer({ src }) {
      const videoRef = useRef(null);
      const [playing, setPlaying] = useState(false);

      const toggle = () => {
        const v = videoRef.current;
        if (!v) return;
        if (v.paused) {
          v.play();
          setPlaying(true);
        } else {
          v.pause();
          setPlaying(false);
        }
      };

      const onEnded = () => setPlaying(false);

      return (
        <div className="video-player-wrap" onClick={toggle}>
          <video ref={videoRef} src={src} onEnded={onEnded} playsInline />
          <div className={`video-poster-overlay ${playing ? 'hidden' : ''}`}>
            <div className="play-btn">
              <div className="play-btn-ring" />
              <div className="play-icon" />
            </div>
          </div>
          <div className="video-label">LoQuRo · Promotion Reel</div>
        </div>
      );
    }

                <div className="hero-eyebrow-dot" />
                Mechatronics Engineering · UVic-UCC · June 2026
              </div>
              <h1 className="hero-title">
                Lo<span className="accent">Qu</span>Ro
              </h1>
              <div className="hero-subtitle">Lowcost Quadruped Robot</div>
              <p className="hero-desc">
                A fully custom-designed quadrupedal robot capable of autonomous locomotion
                controlled entirely through Reinforcement Learning — built for under 300 €.
              </p>

              {/* VIDEO PLAYER — 16:9 clickable */}
              <VideoPlayer src="images/promotion.mp4" />

              <div className="price-callout">
                <div className="price-item">
                  <span className="price-label">LoQuRo cost</span>
                  <span className="price-value ours">~300 €</span>
                </div>
                <div className="price-divider" />
                <div className="price-item">
                  <span className="price-label">vs Unitree Go2</span>
                  <span className="price-value theirs">1.600–3.000 €</span>
                </div>
                <div className="price-divider" />
                <div>
                  <p className="price-note">Less than 25% of the cost</p>
                  <p className="price-note">of a commercial platform</p>
                </div>
              </div>

                  document.getElementById('sections').scrollIntoView({ behavior: 'smooth' });
                }}>
                  Explore the project ↓
                </button>
                <a href="https://github.com/Integrated-Project-2-2026-UVic-UCC/Team1" target="_blank" rel="noreferrer" className="btn-secondary">

                  GitHub
                </a>

    /* ── APP ── */
    function App() {
      const [page, setPage] = useState("home");
      const [navHidden, setNavHidden] = useState(false);
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [darkMode, setDarkMode] = useState(true);

      useEffect(() => {
        document.body.classList.toggle('light', !darkMode);
      }, [darkMode]);

      useEffect(() => {
        let lastY = window.scrollY;
        const onScroll = () => {
          const y = window.scrollY;
          if (!sidebarOpen) setNavHidden(y > lastY && y > 100);
          lastY = y;
        };
        window.addEventListener("scroll", onScroll, { passive: true });
        return () => window.removeEventListener("scroll", onScroll);
      }, [sidebarOpen]);

      useEffect(() => {
        if (sidebarOpen) setNavHidden(false);
      }, [sidebarOpen]);

      const navigate = useCallback((id) => {
        setPage(id);
        setSidebarOpen(false);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }, []);

      const pages = {
        home: <PageHome navigate={navigate} />,
        mechanics: <PageMechanics />,
        electronics: <PageElectronics />,
        software: <PageSoftware />,
        management: <PageManagement />,
      };
